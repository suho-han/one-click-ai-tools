name: goreleaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Run mode: snapshot for branch/manual test, release for tagged release'
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - release
      git_ref:
        description: 'Optional git ref to checkout, for example v0.4.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_mode == 'release' && 'release --clean' || 'release --clean --snapshot') || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
