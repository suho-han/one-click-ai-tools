name: goreleaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Run mode: snapshot for branch/manual test, release for tagged release'
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - release
      git_ref:
        description: 'Optional git ref to checkout, for example v0.4.0'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EFFECTIVE_RELEASE_TAG: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref_name }}

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}
      - name: Validate manual release ref
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode == 'release' }}
        run: |
          if [[ ! "$EFFECTIVE_RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: release_mode=release requires git_ref=vX.Y.Z"
            exit 1
          fi
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_mode == 'release' && 'release --clean' || 'release --clean --snapshot') || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  darwin-assets:
    name: build/upload darwin assets
    needs: goreleaser
    runs-on: macos-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'release')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Validate manual release ref
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode == 'release' }}
        run: |
          if [[ ! "$EFFECTIVE_RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: release_mode=release requires git_ref=vX.Y.Z"
            exit 1
          fi
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Build darwin binaries
        run: |
          set -euo pipefail
          mkdir -p dist/tmp/amd64 dist/tmp/arm64
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -o dist/tmp/amd64/oct main.go
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -o dist/tmp/arm64/oct main.go
          tar -C dist/tmp/amd64 -czf dist/one-click-ai-tools_darwin_amd64.tar.gz oct
          tar -C dist/tmp/arm64 -czf dist/one-click-ai-tools_darwin_arm64.tar.gz oct

      - name: Upload darwin assets to release
        run: |
          gh release upload "$EFFECTIVE_RELEASE_TAG" \
            dist/one-click-ai-tools_darwin_amd64.tar.gz \
            dist/one-click-ai-tools_darwin_arm64.tar.gz \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add darwin assets to checksums
        run: |
          set -euo pipefail
          gh release download "$EFFECTIVE_RELEASE_TAG" -p checksums.txt -D dist --clobber
          (
            cd dist
            awk '$2 !~ /^one-click-ai-tools_darwin_(amd64|arm64)\.tar\.gz$/ {print}' checksums.txt > checksums.tmp
            mv checksums.tmp checksums.txt
            shasum -a 256 one-click-ai-tools_darwin_amd64.tar.gz one-click-ai-tools_darwin_arm64.tar.gz >> checksums.txt
            sort -k2 checksums.txt -o checksums.txt
          )
          gh release upload "$EFFECTIVE_RELEASE_TAG" dist/checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release-assets:
    name: verify release assets
    needs: [goreleaser, darwin-assets]
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'release')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'

      - name: Validate manual release ref
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_mode == 'release' }}
        run: |
          if [[ ! "$EFFECTIVE_RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: release_mode=release requires git_ref=vX.Y.Z"
            exit 1
          fi

      - name: Verify release integrity
        run: bash scripts/verify-release-integrity.sh
        env:
          RELEASE_TAG: ${{ env.EFFECTIVE_RELEASE_TAG }}

      - name: Verify release assets (macOS/Linux)
        run: |
          set -euo pipefail
          tag="$EFFECTIVE_RELEASE_TAG"
          required=(
            "one-click-ai-tools_linux_amd64.tar.gz"
            "one-click-ai-tools_linux_arm64.tar.gz"
            "one-click-ai-tools_darwin_arm64.tar.gz"
            "one-click-ai-tools_darwin_amd64.tar.gz"
            "checksums.txt"
          )

          assets_json="$(gh release view "$tag" --json assets)"
          for name in "${required[@]}"; do
            if ! echo "$assets_json" | jq -e --arg n "$name" '.assets[] | select(.name==$n)' >/dev/null; then
              echo "ERROR: missing release asset: $name (tag: $tag)"
              exit 1
            fi
            echo "OK: found release asset: $name"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
