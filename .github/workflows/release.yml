name: goreleaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_mode:
        description: 'Run mode: snapshot for branch/manual test, release for tagged release'
        required: true
        default: snapshot
        type: choice
        options:
          - snapshot
          - release
      git_ref:
        description: 'Optional git ref to checkout, for example v0.4.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: ${{ github.event_name == 'workflow_dispatch' && (inputs.release_mode == 'release' && 'release --clean' || 'release --clean --snapshot') || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  darwin-assets:
    name: build/upload darwin assets
    needs: goreleaser
    runs-on: macos-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'release')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build darwin binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -o dist/oct_darwin_amd64 main.go
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -o dist/oct_darwin_arm64 main.go
          tar -C dist -czf dist/one-click-tools_darwin_amd64.tar.gz oct_darwin_amd64
          tar -C dist -czf dist/one-click-tools_darwin_arm64.tar.gz oct_darwin_arm64

      - name: Upload darwin assets to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/one-click-tools_darwin_amd64.tar.gz \
            dist/one-click-tools_darwin_arm64.tar.gz \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: publish npm package
    needs: [goreleaser, darwin-assets]
    runs-on: ubuntu-latest
    # 태그 릴리스 또는 수동 release 모드에서만 publish
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'release')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install deps
        run: npm ci

      - name: Build smoke
        run: go build -o oct main.go

      - name: Verify release integrity
        run: bash scripts/verify-release-integrity.sh
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Verify release assets (macOS/Linux)
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          required=(
            "one-click-tools_linux_amd64.tar.gz"
            "one-click-tools_linux_arm64.tar.gz"
            "one-click-tools_darwin_arm64.tar.gz"
          )

          assets_json="$(gh release view "$tag" --json assets)"
          for name in "${required[@]}"; do
            if ! echo "$assets_json" | jq -e --arg n "$name" '.assets[] | select(.name==$n)' >/dev/null; then
              echo "ERROR: missing release asset: $name (tag: $tag)"
              exit 1
            fi
            echo "OK: found release asset: $name"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm publish dry-run
        run: npm publish --dry-run --access public

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
