name: smoke-matrix

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: go test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Version parity guard (root.go vs package.json)
        run: go test ./cmd -run TestRootVersionMatchesPackageJSON -v

      - name: Go test
        run: go test ./...

      - name: Build smoke
        run: go build ./...
